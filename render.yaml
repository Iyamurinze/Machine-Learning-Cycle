# Render blueprint — deploys the API and the dashboard as two Docker services.
#
# Deploy by pointing Render at this repository: New > Blueprint. Render reads
# this file and creates both services.
#
# Note on the free tier: instances sleep after 15 minutes idle and cold-start
# in roughly 30-60 seconds, most of which is TensorFlow importing. The first
# request after a sleep will be slow; subsequent ones are not. For the demo
# video and the load test, wake the service first.

services:
  - type: web
    name: malaria-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
      # A free instance has limited CPU; letting TensorFlow spawn a thread per
      # core causes contention rather than speedup on a shared vCPU.
      - key: OMP_NUM_THREADS
        value: "2"
    autoDeploy: true

  - type: web
    name: malaria-ui
    runtime: docker
    dockerfilePath: ./Dockerfile.ui
    dockerContext: .
    plan: free
    region: frankfurt
    healthCheckPath: /_stcore/health
    envVars:
      - key: PORT
        value: 8501
      # Set explicitly rather than with `fromService`.
      #
      # Neither fromService property yields a reachable address here:
      #   property: hostport -> "malaria-api-t9ex:8000"
      #   property: host     -> "malaria-api-t9ex"
      # Both are private-network names, and free-tier services do not get
      # private networking, so the dashboard fails with NameResolutionError
      # either way. The public hostname is the only address that resolves.
      #
      # IMPORTANT: if you redeploy this blueprint to a fresh Render account,
      # your API will get a different random suffix. Update this value to your
      # own malaria-api URL, or the dashboard will point at someone else's
      # service.
      - key: API_URL
        value: https://malaria-api-t9ex.onrender.com
    autoDeploy: true
