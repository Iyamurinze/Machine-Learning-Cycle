# Render blueprint — deploys the API and the dashboard as two Docker services.
#
# Deploy by pointing Render at this repository: New > Blueprint. Render reads
# this file and creates both services.
#
# Note on the free tier: instances sleep after 15 minutes idle and cold-start
# in roughly 30-60 seconds, most of which is TensorFlow importing. The first
# request after a sleep will be slow; subsequent ones are not. For the demo
# video and the load test, wake the service first.

services:
  - type: web
    name: malaria-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
      # A free instance has limited CPU; letting TensorFlow spawn a thread per
      # core causes contention rather than speedup on a shared vCPU.
      - key: OMP_NUM_THREADS
        value: "2"
    autoDeploy: true

  - type: web
    name: malaria-ui
    runtime: docker
    dockerfilePath: ./Dockerfile.ui
    dockerContext: .
    plan: free
    region: frankfurt
    healthCheckPath: /_stcore/health
    envVars:
      - key: PORT
        value: 8501
      # Wired to the API service by Render at deploy time.
      #
      # Use `host`, not `hostport`. For a web service `hostport` yields the
      # *internal* name and port — "malaria-api-xxxx:8000" — which does not
      # resolve from another container and fails with NameResolutionError.
      # `host` returns the public hostname, "malaria-api-xxxx.onrender.com".
      #
      # Either way the value carries no scheme, so ui/app.py fills one in
      # rather than assuming this is already a usable URL. See
      # _resolve_api_url().
      - key: API_URL
        fromService:
          name: malaria-api
          type: web
          property: host
    autoDeploy: true
