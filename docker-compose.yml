# Local stack for development and for the Locust scaling experiment.
#
# The API sits behind an nginx load balancer so the number of API containers
# can be varied while Locust keeps hitting one stable address. Without the
# balancer, `--scale` would publish each replica on a different random port and
# the load test would only ever reach one of them.
#
#   docker compose up -d --scale api=1    # then run Locust against :8080
#   docker compose up -d --scale api=2
#   docker compose up -d --scale api=4
#
# See locust/README.md for the full measurement procedure.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 8000
      TF_CPP_MIN_LOG_LEVEL: "2"
      # TensorFlow otherwise grabs every core in each container, so replicas
      # fight for the same CPUs and scaling shows no improvement. Pinning to
      # one thread per replica makes the comparison measure concurrency
      # rather than thread thrash.
      OMP_NUM_THREADS: "1"
      TF_NUM_INTRAOP_THREADS: "1"
      TF_NUM_INTEROP_THREADS: "1"
    volumes:
      # Shared so every replica reads the same model and writes staged uploads
      # to one place. A retrain triggered on one replica is then visible to
      # the others on their next model reload.
      - ./models:/app/models
      - ./data/uploads:/app/data/uploads
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
    # No published port: nginx reaches the replicas over the compose network,
    # which is what allows `--scale` to work.
    expose:
      - "8000"
    restart: unless-stopped

  loadbalancer:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      # Through the balancer, so the dashboard exercises the same path as the
      # load test.
      API_URL: http://loadbalancer:80
    depends_on:
      - loadbalancer
    restart: unless-stopped
