# Load balancer in front of the API replicas for the Locust scaling test.

events {
    worker_connections 2048;
}

http {
    access_log off;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Uploaded archives for retraining can be large.
    client_max_body_size 200M;

    # Docker's embedded DNS server. This is the critical piece for `--scale`.
    #
    # A conventional `upstream { server api:8000; }` block resolves the
    # hostname exactly once, at startup, and pins to whichever single replica
    # IP it got back. Docker DNS returns every replica's address, but nginx
    # never asks again — so scaling to 2 or 4 containers changes nothing and
    # every request keeps landing on the same container. That failure is
    # silent: the extra replicas stay up, healthy, and completely idle.
    #
    # `resolver` plus a variable in proxy_pass forces re-resolution on the
    # configured TTL, and Docker DNS rotates the address order it returns, so
    # requests spread across whatever replicas currently exist.
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 80;

        location / {
            # The variable is what makes proxy_pass re-resolve. Inlining
            # "http://api:8000" directly here would restore the caching bug.
            set $api_backend "http://api:8000";
            proxy_pass $api_backend;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # A cold replica has not yet imported TensorFlow or loaded the
            # model, so its first request is slow. Retraining requests return
            # immediately, but uploads can be large.
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            # Move on to another replica rather than surfacing a 502 when one
            # is busy or still warming.
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }
    }
}
